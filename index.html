<!DOCTYPE html>
<html>
<head>
  <title>Coco Login</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #667eea, #764ba2);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .login-box {
      background: white;
      padding: 30px;
      width: 320px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 45%;
      padding: 12px;
      margin: 10px 5px;
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: bold;
    }

    .signup { background: orange; }
    .login { background: #667eea; }
  </style>
</head>

<body>

<div class="login-box">
  <h2>🔐 Coco Login</h2>

  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button class="signup" onclick="signup()">Signup</button>
  <button class="login" onclick="login()">Login</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpGEQBE40nuW1OtkQ1co62gqJMn0Fvoww",
  authDomain: "coco-audio-live.firebaseapp.com",
  projectId: "coco-audio-live",
  storageBucket: "coco-audio-live.firebasestorage.app",
  messagingSenderId: "19697046627",
  appId: "1:19697046627:web:9e1ff6d466073784791456"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Signup
window.signup = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email || !pass) return alert("Fill all fields!");

  let userCred = await createUserWithEmailAndPassword(auth, email, pass);

  await setDoc(doc(db, "users", userCred.user.uid), {
    email: email,
    coin: 100,
    vip: false
  });

  alert("Signup success 🎉");
};

// Login
window.login = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email || !pass) return alert("Fill all fields!");

  await signInWithEmailAndPassword(auth, email, pass);

  alert("Login success ✅");

  window.location.href = "home.html";
};
</script>

</body>
</html>
