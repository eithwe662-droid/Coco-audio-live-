<!DOCTYPE html>
<html>
<head>
  <title>Coco Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      overflow: hidden;
    }

    /* Background glow circles */
    body::before, body::after {
      content: "";
      position: absolute;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      filter: blur(80px);
    }

    body::before {
      top: -50px;
      left: -50px;
    }

    body::after {
      bottom: -50px;
      right: -50px;
    }

    .login-box {
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.15);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 40px;
      width: 90%;
      max-width: 400px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      text-align: center;
      color: white;
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(30px);}
      to {opacity: 1; transform: translateY(0);}
    }

    h2 {
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin: 12px 0;
      border-radius: 12px;
      border: none;
      outline: none;
      font-size: 15px;
      background: rgba(255,255,255,0.2);
      color: white;
    }

    input::placeholder {
      color: #ddd;
    }

    button {
      width: 48%;
      padding: 14px;
      margin: 10px 1%;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .signup {
      background: linear-gradient(45deg, #ff9a00, #ff6a00);
      color: white;
    }

    .login {
      background: linear-gradient(45deg, #00c6ff, #0072ff);
      color: white;
    }

    button:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      color: #ddd;
    }
  </style>
</head>

<body>

<div class="login-box">
  <h2>🔐 Coco Login</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button class="signup" onclick="signup()">Signup</button>
  <button class="login" onclick="login()">Login</button>

  <div class="footer">Welcome to Coco App 💜</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import { getFirestore, doc, setDoc }
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDpGEQBE40nuW1OtkQ1co62gqJMn0Fvoww",
  authDomain: "coco-audio-live.firebaseapp.com",
  projectId: "coco-audio-live",
  storageBucket: "coco-audio-live.firebasestorage.app",
  messagingSenderId: "19697046627",
  appId: "1:19697046627:web:9e1ff6d466073784791456"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.signup = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email || !pass) return alert("Fill all fields!");

  let userCred = await createUserWithEmailAndPassword(auth, email, pass);

  await setDoc(doc(db, "users", userCred.user.uid), {
    email,
    coin: 100,
    vip: false
  });

  alert("Signup success 🎉");
};

window.login = async function () {
  let email = document.getElementById("email").value;
  let pass = document.getElementById("password").value;

  if (!email || !pass) return alert("Fill all fields!");

  await signInWithEmailAndPassword(auth, email, pass);

  alert("Login success ✅");

  window.location.href = "home.html";
};
</script>

</body>
</html>
